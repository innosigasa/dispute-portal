services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dispute_portal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./DisputePortalApi
      dockerfile: DisputePortal.WebApi/Dockerfile
    restart: unless-stopped
    environment:
      ConnectionStrings__DisputePortalDb: "Host=db;Port=5432;Database=${POSTGRES_DB:-dispute_portal};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      JwtBearerSettings__SecretKey: ${JWT_SECRET_KEY:-change-me-to-a-32-char-secret-key!!}
      JwtBearerSettings__Issuer: ${JWT_ISSUER:-DisputePortalApi}
      JwtBearerSettings__Audience: ${JWT_AUDIENCE:-DisputePortalClients}
      JwtBearerSettings__AccessTokenExpiryMinutes: "60"
      JwtBearerSettings__RefreshTokenExpiryDays: "7"
      PasswordHashSettings__Salt: ${PASSWORD_HASH_SALT:-change-me-salt-value!!}
      ASPNETCORE_ENVIRONMENT: Development
      Cors__AllowedOrigins__0: "http://localhost:3000"
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: ./dispute-portal-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
